name: Fetch Latest Releases
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  fetch-latest-releases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y jq

      - name: Fetch release data, plugin metadata, and write to JSON
        run: |
          export GITHUB_TOKEN="${{ github.token }}"
          echo "{}" > all_releases.json
          echo "{}" > all_histories.json

          repos=("DP-Plugins/DPP-Core" "DP-Plugins/DP-SimplePrefix" "DP-Plugins/DP-CustomFarming" "DP-Plugins/DP-AFKShop" "DP-Plugins/DP-RewardChest" "DP-Plugins/DP-Menu" "DP-Plugins/DP-Cash" "DP-Plugins/DP-ItemEditor" "DP-Plugins/DP-GUIShop" "DP-Plugins/DP-VirtualStorage" "DP-Plugins/DP-Evaluation" "DP-Plugins/DP-SimpleAnnouncement" "DP-Plugins/DP-Ban" "DP-Plugins/DP-ConsumeBox" "DP-Plugins/DP-ItemCategory" "DP-Plugins/DP-ItemCollection" "DP-Plugins/DP-ItemSkin" "DP-Plugins/DP-MailBox" "DP-Plugins/DP-StreamNotify" "DP-Plugins/DP-CustomCrafting" "DP-Plugins/DP-Banknote" "DP-Plugins/DP-ToolRepair" "DP-Plugins/DP-MaterialShop" "DP-Plugins/DP-DailyReward" "DP-Plugins/DP-Coupon")

          for repo in "${repos[@]}"; do
            releases=$(curl -s -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/$repo/releases?per_page=10")

            is_array=$(echo "$releases" | jq 'type == "array"')
            if [[ "$is_array" != "true" ]]; then
              echo "Error fetching releases for $repo"
              exit 1
            else
              count=$(echo "$releases" | jq 'length')
            fi

            repo_name=$(echo "$repo" | sed 's/DP-Plugins\///')

            md=""
            repo_releases="[]"

            for i in $(seq 0 $(($count - 1))); do
              name=$(echo "$releases" | jq -r ".[$i].name")
              tag=$(echo "$releases" | jq -r ".[$i].tag_name")
              url=$(echo "$releases" | jq -r ".[$i].html_url")
              date=$(echo "$releases" | jq -r ".[$i].published_at")
              body=$(echo "$releases" | jq -r ".[$i].body")

              if [[ "$tag" == "null" ]]; then
                continue
              fi

              # 🔽 assets + 다운로드 수 처리 (안정 버전)
              assets=$(echo "$releases" | jq ".[$i].assets")
              is_array=$(echo "$assets" | jq 'type == "array"')

              if [[ "$is_array" != "true" ]]; then
                assets_json="[]"
                total_download_count=0
              else
                assets_json=$(echo "$assets" | jq '[.[] | {
                  name: .name,
                  download_count: .download_count,
                  url: .browser_download_url
                }]')

                total_download_count=$(echo "$assets" | jq '[.[].download_count] | add // 0')
              fi

              # 🔽 숫자 안정화 (핵심)
              total_download_count=${total_download_count:-0}

              item=$(jq -n \
                --arg repo "$repo_name" \
                --arg name "$name" \
                --arg tag "$tag" \
                --arg url "$url" \
                --arg date "$date" \
                --arg body "$body" \
                --argjson assets "$assets_json" \
                --arg total_download_count "$total_download_count" \
                '{
                  repo: $repo,
                  name: $name,
                  tag: $tag,
                  url: $url,
                  published_at: $date,
                  body: $body,
                  assets: $assets,
                  total_download_count: ($total_download_count | tonumber)
                }')

              repo_releases=$(echo "$repo_releases" | jq ". += [$item]")

              md+="### 🔖 $tag\n[Release Link]($url)\n**Downloads:** $total_download_count\n"
            done

            jq --arg repo "$repo_name" --argjson data "$repo_releases" '.[$repo] = $data' all_releases.json > tmp.json && mv tmp.json all_releases.json
            jq --arg repo "$repo_name" --arg md "$md" '.[$repo] = $md' all_histories.json > tmp.json && mv tmp.json all_histories.json
          done

          if [ -f releases.json ]; then
            current_versions=$(cat releases.json | jq -c '.releases | map_values([.[] | .tag] | sort | join(","))')
          else
            current_versions="{}"
          fi

          new_versions=$(cat all_releases.json | jq -c 'map_values([.[] | .tag] | sort | join(","))')

          changed=false
          if [[ "$current_versions" != "$new_versions" ]]; then
            changed=true
          fi

          if [ "$changed" = true ]; then
            jq -n \
              --argjson releases "$(cat all_releases.json)" \
              --argjson update_history "$(cat all_histories.json)" \
              '{update_history: $update_history, releases: $releases}' > temp_releases.json
            echo "Version changes detected; updating releases.json"
          else
            echo "No version changes; skipping update."
          fi

      - name: Commit and push if changed
        run: |
          if [ -f temp_releases.json ]; then
            mv temp_releases.json releases.json
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add releases.json

            if git diff --cached --quiet; then
              echo "No actual changes after update; skipping commit."
            else
              git commit -m "Update releases.json with download counts (fixed)"
              git push
            fi

            rm -f all_releases.json all_histories.json
          else
            echo "No update needed."
          fi
